<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>3 Menus</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            text-align: center;
        }

        .label {
            font-size: 30px;
            margin: 20px 0;
        }

        .menu {
            background: red;
            color: white;
            padding: 20px;
            margin-bottom: 30px;
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .icons {
            margin-top: 20px;
        }

        .icons i {
            font-size: 24px;
            margin: 0 10px;
        }

        .desktop ul {
            display: flex;
            justify-content: space-around;
        }

        .desktop .icons {
            display: flex;
            justify-content: space-around;
        }

        .tablet ul {
            display: flex;
            flex-wrap: wrap;
        }

        .tablet li {
            width: 50%;
            text-align: center;
            margin-bottom: 15px;
        }

        .tablet .icons {
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
        }


        .mobile ul {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .mobile .icons {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
    </style>

</head>

<body>

    <div class="label">1001px+</div>
    <nav class="menu desktop">
        <ul>
            <li>Home</li>
            <li>About Us</li>
            <li>Team</li>
            <li>Services</li>
            <li>Blog</li>
            <li>Contact</li>
        </ul>
        <div class="icons">
            <i class="fa-solid fa-user"></i>
            <i class="fa-solid fa-cart-shopping"></i>
            <i class="fa-solid fa-arrow-right-from-bracket"></i>
        </div>
    </nav>

    <div class="label">1000px</div>
    <nav class="menu tablet">
        <ul>
            <li>Home</li>
            <li>About Us</li>
            <li>Team</li>
            <li>Services</li>
            <li>Blog</li>
            <li>Contact</li>
        </ul>
        <div class="icons">
            <i class="fa-solid fa-user"></i>
            <i class="fa-solid fa-cart-shopping"></i>
            <i class="fa-solid fa-arrow-right-from-bracket"></i>
        </div>
    </nav>

    <div class="label">480px</div>
    <nav class="menu mobile">
        <ul>
            <li>Home</li>
            <li>About Us</li>
            <li>Team</li>
            <li>Services</li>
            <li>Blog</li>
            <li>Contact</li>
        </ul>
        <div class="icons">
            <i class="fa-solid fa-user"></i>
            <i class="fa-solid fa-cart-shopping"></i>
            <i class="fa-solid fa-arrow-right-from-bracket"></i>
        </div>
    </nav>

</body>

</html>
