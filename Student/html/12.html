<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Таблиця псевдокласами</title>

<style>
body {
    text-align: center;
    font-family: Arial;
}

table {
    margin: auto;
    border-collapse: collapse;
    width: 700px;
}

th, td {
    border: 2px solid black;
    text-align: center;
    transition: 0.1s;
}

th {
    background: black;
    color: white;
}

tr:nth-child(2n) {
    background: black;
    color: white;
}

tr:nth-child(2n+1):not(:first-child) {
    background: white;
}

tr:nth-child(2) td:hover,
tr:nth-child(4) td:hover,
tr:nth-child(6) td:hover {
    background: blue;
    color: white;
}

tr:nth-child(3) td:hover,
tr:nth-child(5) td:hover {
    background: red;
    color: yellow;
}

</style>

</head>
<body>

<h2>Таблиця псевдокласами</h2>

<table>
    <tr>
        <th>№ п/п</th>
        <th>стовпчик 1</th>
        <th>стовпчик 2</th>
        <th>стовпчик 3</th>
        <th>стовпчик 4</th>
    </tr>

    <tr>
        <td>1</td><td>125</td><td>256</td><td>224</td><td>878</td>
    </tr>
    <tr>
        <td>2</td><td>245</td><td>348</td><td>456</td><td>965</td>
    </tr>
    <tr>
        <td>3</td><td>234</td><td>523</td><td>362</td><td>213</td>
    </tr>
    <tr>
        <td>4</td><td>34</td><td>525</td><td>425</td><td>452</td>
    </tr>
    <tr>
        <td>5</td><td>234</td><td>435</td><td>556</td><td>657</td>
    </tr>
</table>

</body>
</html>
