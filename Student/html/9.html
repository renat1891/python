<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Таблиця</title>

  <style>
    table {
      border-collapse: collapse;
      width: 600px;
    }
    caption {
      text-align: right;
    }

    td, th {
      text-align: center;
      color: white;
      border: 1px dotted rgb(0, 0, 0);
    }
    th{
      background-color: #00326C;
    }

    td:nth-child(1){
      background-color: #628DB3;
    }

    tr:nth-child(2n){
      background-color: blue;
    }
    tr:nth-child(2n+1){
      background-color: #81007F;
    }
  </style>

</head>
<body>

  <table>
    <caption>Заголовок таблиці</caption>
    <tr>
      <th>№ п/п</th>
      <th>стовпчик 1</th>
      <th>стовпчик 2</th>
      <th>стовпчик 3</th>
      <th>стовпчик 4</th>
    </tr>

    <tr>
      <td>1</td>
      <td>125</td>
      <td>256</td>
      <td>224</td>
      <td>878</td>
    </tr>

    <tr>
      <td>2</td>
      <td>245</td>
      <td>348</td>
      <td>456</td>
      <td>965</td>
    </tr>

    <tr>
      <td>3</td>
      <td>234</td>
      <td>523</td>
      <td>362</td>
      <td>213</td>
    </tr>

    <tr>
      <td>4</td>
      <td></td>
      <td>525</td>
      <td>425</td>
      <td>452</td>
    </tr>

    <tr>
      <td>5</td>
      <td></td>
      <td>435</td>
      <td>556</td>
      <td>657</td>
    </tr>

  </table>

</body>
</html>
