<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Таблиця</title>

  <style>
    table {
      border-collapse: collapse;
      width: 600px;
    }

    td, th {
      text-align: center;
      color: white;
      border: 2px dotted white;
    }
  </style>

</head>
<body>

  <p align="right"><b>Заголовок таблиці</b></p>

  <table>

    <tr bgcolor="blue">
      <th>№ п/п</th>
      <th>стовпчик 1</th>
      <th>стовпчик 2</th>
      <th>стовпчик 3</th>
      <th>стовпчик 4</th>
    </tr>

    <tr bgcolor="blue">
      <td>1</td>
      <td bgcolor="purple">125</td>
      <td>256</td>
      <td>224</td>
      <td>878</td>
    </tr>

    <tr bgcolor="purple">
      <td>2</td>
      <td>245</td>
      <td>348</td>
      <td>456</td>
      <td>965</td>
    </tr>

    <tr bgcolor="blue">
      <td>3</td>
      <td bgcolor="purple">234</td>
      <td>523</td>
      <td>362</td>
      <td>213</td>
    </tr>

    <tr bgcolor="purple">
      <td>4</td>
      <td></td>
      <td>525</td>
      <td>425</td>
      <td>452</td>
    </tr>

    <tr bgcolor="blue">
      <td>5</td>
      <td bgcolor="purple"></td>
      <td>435</td>
      <td>556</td>
      <td>657</td>
    </tr>

  </table>

</body>
</html>
