<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        li:nth-child(2n){
            background-color: rgb(3, 145, 57);
            list-style-type: none;
        }
        li:nth-child(2n+1){
            background-color: rgb(224, 220, 220);
        }
        
    </style>
</head>



<body>
    <h2>List Example</h2>

    <ul>
        <li>item 1</li>
        <li>item 2</li>
        <li>item 3</li>
        <li>item 4</li>
        <li>item 5</li>
        <li>item 6</li>
    </ul>
    
</body>
</html>
